<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Chinh Sua Sinh Vien' : 'Them Sinh Vien Moi'">Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-lg mx-auto px-4 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-3xl font-bold text-gray-800"
                th:text="${isEdit} ? 'Chinh Sua Sinh Vien' : 'Them Sinh Vien Moi'">Form</h1>
            <a href="/students"
               class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                ← Quay lai
            </a>
        </div>

        <!-- Form -->
        <div class="bg-white rounded-lg shadow p-6">
            <!-- Form Them Moi -->
            <form th:if="${!isEdit}" action="/students/save" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Ho va Ten</label>
                    <input type="text" name="name" th:value="${student.name}" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="Nhap ho ten..." />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" th:value="${student.email}" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="Nhap email..." />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tuoi</label>
                    <input type="number" name="age" th:value="${student.age}" required min="1" max="150"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="Nhap tuoi..." />
                </div>
                <button type="submit"
                        class="w-full py-2.5 bg-green-600 text-white font-medium rounded-lg shadow hover:bg-green-700 transition">
                    Luu Sinh Vien
                </button>
            </form>

            <!-- Form Chinh Sua -->
            <form th:if="${isEdit}" th:action="@{/students/{id}/edit(id=${student.id})}" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ID</label>
                    <input type="text" th:value="${student.id}" disabled
                           class="w-full px-4 py-2 border border-gray-200 rounded-lg bg-gray-100 text-gray-500" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Ho va Ten</label>
                    <input type="text" name="name" th:value="${student.name}" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" th:value="${student.email}" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tuoi</label>
                    <input type="number" name="age" th:value="${student.age}" required min="1" max="150"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
                </div>
                <button type="submit"
                        class="w-full py-2.5 bg-yellow-500 text-white font-medium rounded-lg shadow hover:bg-yellow-600 transition">
                    Cap Nhat
                </button>
            </form>
        </div>
    </div>
</body>
</html>
